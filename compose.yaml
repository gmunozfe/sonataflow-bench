services:
  postgres:
    image: postgres:17
    container_name: sonataflow-bench-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sonataflow
      POSTGRES_USER: sonataflow
      POSTGRES_PASSWORD: sonataflow
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
